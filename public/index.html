<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Amealcom Chat</title>
    <style>
      :root {
        --primary-color: #94c11e; /* verde Amealcom */
        --primary-hover: #7ea91a;
        --secondary-color: #0d234b; /* azul oscuro */
        --light-bg: #f9fafb;
        --border-color: #e5e7eb;
        --text-color: #1f2937;
        --text-light: #6b7280;
        --user-msg-bg: #eaf7d0; /* verde suave */
        --assistant-msg-bg: #ffffff;
      }

      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Oxygen, Ubuntu,
          Cantarell, sans-serif;
        line-height: 1.6;
        color: var(--text-color);
        max-width: 800px;
        margin: 0 auto;
        padding: 1rem;
        background-color: var(--light-bg);
      }

      header {
        text-align: center;
        margin-bottom: 2rem;
        padding: 1rem 0;
        border-bottom: 2px solid var(--primary-color);
      }

      h1 {
        font-size: 1.6rem;
        color: var(--primary-color);
        font-weight: 700;
      }

      header p {
        color: var(--text-light);
      }

      .chat-container {
        display: flex;
        flex-direction: column;
        height: calc(100vh - 200px);
        min-height: 400px;
        border: 1px solid var(--border-color);
        border-radius: 12px;
        overflow: hidden;
        background: white;
      }

      .chat-messages {
        flex: 1;
        overflow-y: auto;
        padding: 1rem;
        background-color: var(--light-bg);
      }

      .message {
        margin-bottom: 1rem;
        padding: 0.8rem 1rem;
        border-radius: 12px;
        max-width: 80%;
        box-shadow: 0 2px 6px rgba(0, 0, 0, 0.05);
      }

      .message p {
        white-space: pre-line;
        margin: 0;
        overflow-wrap: anywhere;
      }

      .user-message {
        background-color: var(--user-msg-bg);
        align-self: flex-end;
        margin-left: auto;
      }

      .assistant-message {
        background-color: var(--assistant-msg-bg);
        align-self: flex-start;
        border-left: 4px solid var(--primary-color);
      }

      .message-input {
        display: flex;
        padding: 0.75rem;
        border-top: 1px solid var(--border-color);
        background-color: white;
      }

      #user-input {
        flex: 1;
        padding: 0.75rem;
        border: 1px solid var(--border-color);
        border-radius: 6px;
        font-family: inherit;
        resize: none;
        min-height: 44px;
      }

      #send-button {
        margin-left: 0.5rem;
        padding: 0 1.2rem;
        background-color: var(--primary-color);
        color: white;
        border: none;
        border-radius: 6px;
        cursor: pointer;
        font-weight: 600;
        transition: all 0.2s;
      }

      #send-button:hover {
        background-color: var(--primary-hover);
        transform: translateY(-1px);
      }

      #send-button:disabled {
        background-color: var(--text-light);
        cursor: not-allowed;
      }

      .typing-indicator {
        display: none;
        font-style: italic;
        color: var(--text-light);
        padding: 1rem;
      }

      .typing-indicator.visible {
        display: block;
      }

      footer {
        margin-top: 1rem;
        text-align: center;
        font-size: 0.85rem;
        color: var(--text-light);
      }
    </style>
  </head>
  <body>
    <header>
      <h1>Amealcom Chat</h1>
      <p>Soporte inteligente para tu internet</p>
    </header>

    <div class="chat-container">
      <div id="chat-messages" class="chat-messages">
        <div class="message assistant-message">
          <p>
            ¡Hola! Soy el asistente virtual de Amealcom 👋\nEstoy aquí para
            ayudarte con tu servicio de internet, reportes de fallas, pagos o
            cobertura.\n\n¿En qué puedo ayudarte hoy?
          </p>
        </div>
      </div>

      <div class="typing-indicator" id="typing-indicator">
        Amealcom está escribiendo...
      </div>

      <div class="message-input">
        <textarea
          id="user-input"
          placeholder="Escribe tu mensaje aquí..."
          rows="1"
          autofocus
        ></textarea>
        <button id="send-button">Enviar</button>
      </div>
    </div>

    <footer>
      <p>Amealcom Chat &copy; 2026</p>
    </footer>

    <script src="chat.js"></script>
  </body>
</html>
